<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Kenshin</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;

    background:
    radial-gradient(circle at top left,#2d4059 0%,transparent 45%),
    radial-gradient(circle at bottom right,#1b2845 0%,transparent 45%),
    linear-gradient(135deg,#0d1117,#111827);

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    font-family:
        "Hiragino Sans",
        "Noto Sans JP",
        sans-serif;

    padding:30px;
}

.card{
    width:min(820px,95%);
    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.12);

    border-radius:28px;

    padding:60px 45px;

    text-align:center;

    box-shadow:
        0 30px 80px rgba(0,0,0,.4);
}

.sub{
    letter-spacing:4px;
    font-size:12px;
    opacity:.65;

    margin-bottom:20px;
}

h1{
    font-size:42px;
    margin-bottom:18px;
}

.message{
    font-size:18px;
    line-height:1.9;
    color:rgba(255,255,255,.82);

    margin-bottom:42px;
}

.input-area{
    display:flex;
    gap:12px;

    justify-content:center;
    flex-wrap:wrap;
}

input{
    width:300px;

    padding:16px 18px;

    border:none;

    border-radius:14px;

    background:rgba(255,255,255,.1);

    color:white;

    outline:none;

    font-size:16px;
}

input::placeholder{
    color:rgba(255,255,255,.45);
}

button{
    padding:16px 28px;

    border:none;

    border-radius:14px;

    cursor:pointer;

    color:white;

    background:
        linear-gradient(
            135deg,
            #5b8cff,
            #8b5cf6
        );

    font-size:16px;

    transition:.25s;
}

button:hover{
    transform:
        translateY(-2px);

    box-shadow:
        0 12px 30px
        rgba(108,99,255,.35);
}

#error{
    margin-top:18px;

    color:#ff7c7c;

    min-height:24px;
}

#videoWrap{

    display:none;

    margin-top:42px;

    opacity:0;

    transform:translateY(18px);

    transition:
        .7s;
}

#videoWrap.show{
    opacity:1;
    transform:translateY(0);
}

video{
    width:100%;

    border-radius:18px;

    overflow:hidden;

    box-shadow:
        0 20px 50px
        rgba(0,0,0,.45);
}

.note{
    margin-top:16px;

    font-size:13px;

    opacity:.55;
}

</style>
</head>

<body>

<div class="card">

<div class="sub">
MESSAGE 
</div>

<h1>中崎健心君へ</h1>

<div class="message">
この動画を見て、<br>
少し立ち止まって自分自身を振り返ってみてください。
</div>

<div class="input-area">
<input
id="pw"
type="password"
placeholder="Password">

<button onclick="openVideo()">
OPEN
</button>
</div>

<div id="error"></div>

<div id="videoWrap">

<video id="movie" controls>
<source src="kenshin-1.mov" type="video/quicktime">
動画を再生できません
</video>

<div class="note">
Video unlocked
</div>

</div>

</div>

<script>

function openVideo(){

const pass =
document
.getElementById("pw")
.value;

const correct =
"Shirushi";

const videoArea =
document
.getElementById("videoWrap");

const error =
document
.getElementById("error");

if(pass===correct){

videoArea.style.display=
"block";

setTimeout(()=>{
videoArea.classList.add(
"show"
);
},50);

error.textContent="";

document
.getElementById("movie")
.scrollIntoView({
behavior:"smooth"
});

}else{

error.textContent=
"Password が違います";

}

}

document
.getElementById("pw")
.addEventListener(
"keydown",
function(e){
if(e.key==="Enter"){
openVideo();
}
}
);

</script>

</body>
</html>
